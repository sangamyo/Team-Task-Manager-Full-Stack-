services:
  - type: web
    name: quantum-teams-api
    runtime: node
    rootDir: api
    buildCommand: npm install --omit=dev && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20.19.0
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRES_IN
        value: 14d
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
