# Nixpacks configuration for Express backend deployment on Railway
# This ensures Node.js 20.x and proper build steps

[languages]
nodes = ["20.17.1"]

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm install --legacy-peer-deps"]

[phases.build]
cmds = ["npm run build 2>/dev/null || echo 'No build script defined'"]

[start]
cmd = "npm start"
